<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能管理 - StarClaw</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #f0f0f0;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .panel {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .panel.active {
            display: block;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-bar button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-bar button:hover {
            transform: translateY(-2px);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .skill-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .skill-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .skill-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
        }

        .skill-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .skill-status.installed {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .skill-status.enabled {
            background: #e3f2fd;
            color: #1976d2;
        }

        .skill-status.disabled {
            background: #fff3e0;
            color: #f57c00;
        }

        .skill-status.not-installed {
            background: #f5f5f5;
            color: #757575;
        }

        .skill-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .skill-description {
            color: #444;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .skill-tag {
            padding: 4px 10px;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 0.85em;
            color: #666;
        }

        .skill-actions {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ffebee;
            color: #d32f2f;
        }

        .btn-danger:hover {
            background: #ffcdd2;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .install-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-help {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 600;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.9em;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #4caf50;
        }

        .toast.error {
            background: #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>技能管理中心</h1>
            <p>安装、管理和调用 StarClaw 技能</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('installed')">已安装技能</button>
            <button class="tab" onclick="switchTab('market')">技能市场</button>
            <button class="tab" onclick="switchTab('install')">安装新技能</button>
        </div>

        <!-- 已安装技能 -->
        <div id="panel-installed" class="panel active">
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">总技能数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-enabled">0</div>
                    <div class="stat-label">已启用</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-disabled">0</div>
                    <div class="stat-label">已禁用</div>
                </div>
            </div>
            <div id="installed-skills" class="skills-grid"></div>
        </div>

        <!-- 技能市场 -->
        <div id="panel-market" class="panel">
            <div class="search-bar">
                <input type="text" id="market-search" placeholder="搜索技能..." onkeypress="if(event.key==='Enter') searchMarket()">
                <button onclick="searchMarket()">搜索</button>
            </div>
            <div id="market-skills" class="skills-grid"></div>
        </div>

        <!-- 安装新技能 -->
        <div id="panel-install" class="panel">
            <div class="install-form">
                <h3 style="margin-bottom: 20px;">从来源安装</h3>
                <div class="form-group">
                    <label>技能来源</label>
                    <input type="text" id="install-source" placeholder="Git URL / 本地路径 / npm 包名">
                    <div class="form-help">
                        支持格式：<br>
                        - Git 仓库: https://github.com/user/skill.git<br>
                        - 本地路径: ./path/to/skill<br>
                        - npm 包: npm://package-name
                    </div>
                </div>
                <div class="form-group">
                    <label>技能 ID（可选）</label>
                    <input type="text" id="install-id" placeholder="留空则自动从来源提取">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="installSkill()">安装技能</button>
            </div>
        </div>
    </div>

    <!-- 技能详情模态框 -->
    <div id="skill-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">技能详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/skills';
        let installedSkills = [];
        let marketSkills = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadInstalledSkills();
            loadMarketSkills();
        });

        // 切换标签
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`panel-${tabName}`).classList.add('active');
        }

        // 加载已安装技能
        async function loadInstalledSkills() {
            try {
                const res = await fetch(API_BASE);
                const data = await res.json();
                
                installedSkills = data.skills || [];
                renderInstalledSkills();
                updateStats();
            } catch (error) {
                showToast('加载已安装技能失败: ' + error.message, 'error');
            }
        }

        // 渲染已安装技能
        function renderInstalledSkills() {
            const container = document.getElementById('installed-skills');
            
            if (installedSkills.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>暂无已安装的技能</h3>
                        <p>前往"技能市场"或"安装新技能"添加技能</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = installedSkills.map(skill => `
                <div class="skill-card">
                    <div class="skill-header">
                        <div class="skill-title">${skill.name || skill.id}</div>
                        <div class="skill-status ${skill.enabled ? 'enabled' : 'disabled'}">
                            ${skill.enabled ? '已启用' : '已禁用'}
                        </div>
                    </div>
                    <div class="skill-meta">
                        版本: ${skill.version || '1.0.0'} | 作者: ${skill.author || 'unknown'}
                    </div>
                    <div class="skill-description">${skill.description || '无描述'}</div>
                    ${skill.tags && skill.tags.length > 0 ? `
                        <div class="skill-tags">
                            ${skill.tags.map(tag => `<span class="skill-tag">${tag}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="skill-actions">
                        <button class="btn btn-secondary" onclick="showSkillDetail('${skill.id}')">详情</button>
                        ${skill.enabled ? 
                            `<button class="btn btn-secondary" onclick="toggleSkill('${skill.id}', false)">禁用</button>` :
                            `<button class="btn btn-primary" onclick="toggleSkill('${skill.id}', true)">启用</button>`
                        }
                        <button class="btn btn-danger" onclick="uninstallSkill('${skill.id}')">卸载</button>
                    </div>
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('stat-total').textContent = installedSkills.length;
            document.getElementById('stat-enabled').textContent = installedSkills.filter(s => s.enabled).length;
            document.getElementById('stat-disabled').textContent = installedSkills.filter(s => !s.enabled).length;
        }

        // 加载技能市场
        async function loadMarketSkills() {
            try {
                const res = await fetch(`${API_BASE}/market`);
                const data = await res.json();
                
                marketSkills = data.skills || [];
                renderMarketSkills();
            } catch (error) {
                console.error('加载技能市场失败:', error);
            }
        }

        // 渲染技能市场
        function renderMarketSkills(skills = marketSkills) {
            const container = document.getElementById('market-skills');
            
            container.innerHTML = skills.map(skill => {
                const isInstalled = installedSkills.some(s => s.id === skill.id);
                return `
                    <div class="skill-card">
                        <div class="skill-header">
                            <div class="skill-title">${skill.name || skill.id}</div>
                            <div class="skill-status ${isInstalled ? 'installed' : 'not-installed'}">
                                ${isInstalled ? '已安装' : '未安装'}
                            </div>
                        </div>
                        <div class="skill-description">${skill.description || '无描述'}</div>
                        ${skill.tags && skill.tags.length > 0 ? `
                            <div class="skill-tags">
                                ${skill.tags.map(tag => `<span class="skill-tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                        <div class="skill-actions">
                            ${skill.source && !isInstalled ? 
                                `<button class="btn btn-primary" onclick="installFromMarket('${skill.source}', '${skill.id}')">安装</button>` :
                                `<button class="btn btn-secondary" disabled>已安装</button>`
                            }
                            <button class="btn btn-secondary" onclick="showSkillDetail('${skill.id}')">详情</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 搜索技能市场
        async function searchMarket() {
            const query = document.getElementById('market-search').value.trim();
            if (!query) {
                renderMarketSkills();
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                renderMarketSkills(data.skills);
            } catch (error) {
                showToast('搜索失败: ' + error.message, 'error');
            }
        }

        // 安装技能
        async function installSkill() {
            const source = document.getElementById('install-source').value.trim();
            const id = document.getElementById('install-id').value.trim();

            if (!source) {
                showToast('请输入技能来源', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/install`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source, id })
                });

                const data = await res.json();
                
                if (data.success) {
                    showToast('技能安装成功!', 'success');
                    document.getElementById('install-source').value = '';
                    document.getElementById('install-id').value = '';
                    loadInstalledSkills();
                    loadMarketSkills();
                } else {
                    showToast('安装失败: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('安装失败: ' + error.message, 'error');
            }
        }

        // 从市场安装
        async function installFromMarket(source, id) {
            try {
                const res = await fetch(`${API_BASE}/install`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source, id })
                });

                const data = await res.json();
                
                if (data.success) {
                    showToast('技能安装成功!', 'success');
                    loadInstalledSkills();
                    loadMarketSkills();
                } else {
                    showToast('安装失败: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('安装失败: ' + error.message, 'error');
            }
        }

        // 卸载技能
        async function uninstallSkill(skillId) {
            if (!confirm(`确定要卸载技能 "${skillId}" 吗?`)) {
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/${skillId}/uninstall`, {
                    method: 'POST'
                });

                const data = await res.json();
                
                if (data.success) {
                    showToast('技能已卸载', 'success');
                    loadInstalledSkills();
                    loadMarketSkills();
                } else {
                    showToast('卸载失败: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('卸载失败: ' + error.message, 'error');
            }
        }

        // 启用/禁用技能
        async function toggleSkill(skillId, enable) {
            try {
                const action = enable ? 'enable' : 'disable';
                const res = await fetch(`${API_BASE}/${skillId}/${action}`, {
                    method: 'POST'
                });

                const data = await res.json();
                
                if (data.success) {
                    showToast(`技能已${enable ? '启用' : '禁用'}`, 'success');
                    loadInstalledSkills();
                } else {
                    showToast('操作失败: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('操作失败: ' + error.message, 'error');
            }
        }

        // 显示技能详情
        async function showSkillDetail(skillId) {
            try {
                const res = await fetch(`${API_BASE}/${skillId}`);
                const data = await res.json();
                
                if (data.success) {
                    const skill = data.skill;
                    document.getElementById('modal-title').textContent = skill.name || skill.id;
                    document.getElementById('modal-body').innerHTML = `
                        <p><strong>ID:</strong> ${skill.id}</p>
                        <p><strong>版本:</strong> ${skill.version || '1.0.0'}</p>
                        <p><strong>作者:</strong> ${skill.author || 'unknown'}</p>
                        <p><strong>状态:</strong> ${skill.enabled ? '已启用' : '已禁用'}</p>
                        <p><strong>描述:</strong> ${skill.description || '无描述'}</p>
                        ${skill.content ? `
                            <h3 style="margin-top: 20px;">定义文件 (SKILL.md)</h3>
                            <pre>${escapeHtml(skill.content)}</pre>
                        ` : ''}
                    `;
                    document.getElementById('skill-modal').classList.add('active');
                }
            } catch (error) {
                showToast('加载详情失败: ' + error.message, 'error');
            }
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('skill-modal').classList.remove('active');
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 点击模态框外部关闭
        document.getElementById('skill-modal').addEventListener('click', (e) => {
            if (e.target.id === 'skill-modal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
