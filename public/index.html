let allTools = [];
let currentCategory = 'all';
let currentView = 'grid';

// 加载工具数据
async function loadTools() {
    showLoading();
    try {
        // 直接使用嵌入式数据（863个工具）
        if (typeof BOOKMARK_TOOLS !== 'undefined' && BOOKMARK_TOOLS.length > 0) {
            allTools = BOOKMARK_TOOLS;
            console.log(`已加载 ${allTools.length} 个工具（收藏夹数据）`);
        } else {
            // 回退到内置数据
            allTools = TOOLS_DATA;
            console.log(`使用内置 ${TOOLS_DATA.length} 个工具`);
        }
        
        renderCategories();
        renderTools();
        updateStats();
    } catch (error) {
        console.error('加载失败:', error);
        showErrorState();
    }
}

// 渲染分类
function renderCategories() {
    const counts = {'all': allTools.length};
    allTools.forEach(t => { counts[t.category] = (counts[t.category]||0)+1; });
    
    const container = document.getElementById('category-list');
    container.innerHTML = Object.entries(CATEGORIES).map(([id,cat]) => `
        <li class="category-item ${currentCategory===id?'active':''}" onclick="filterCategory('${id}')">
            <span>${cat.icon}</span>
            <span>${cat.name}</span>
            <span class="category-count">${counts[id]||0}</span>
        </li>
    `).join('');
}

// 渲染工具
function renderTools() {
    const container = document.getElementById('tools-container');
    let tools = currentCategory==='all' ? allTools : allTools.filter(t=>t.category===currentCategory);
    
    // 排序
    const sort = document.getElementById('sort-select').value;
    if (sort==='rating') tools.sort((a,b)=>(b.rating||0)-(a.rating||0));
    else if (sort==='name') tools.sort((a,b)=>a.name.localeCompare(b.name));
    else if (sort==='hot') tools.sort((a,b)=>(b.isHot?1:0)-(a.isHot?1:0));
    
    if (tools.length===0) {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>未找到相关工具</h3><p>试试切换分类或搜索关键词</p></div>`;
        return;
    }
    
    container.innerHTML = tools.map(t => createToolCard(t)).join('');
    container.className = currentView==='list' ? 'tools-list' : 'tools-grid';
}

// 创建工具卡片
function createToolCard(tool) {
    const badge = tool.isHot ? '<span class="tool-badge badge-hot">热门</span>' : (tool.isNew ? '<span class="tool-badge badge-new">新增</span>' : '');
    const catClass = `cat-${tool.category||'productivity'}`;
    const rating = tool.rating||4.0;
    const stars = '★'.repeat(Math.floor(rating)) + (rating%1>=0.5?'½':'');
    
    const cardClass = currentView==='list' ? 'tool-card list-card' : 'tool-card';
    
    return `
        <div class="${cardClass}" onclick="showDetail('${tool.id}')">
            ${badge}
            <div class="tool-header">
                <div class="tool-icon ${catClass}">${getIcon(tool.category)}</div>
                <div class="tool-title">
                    <div class="tool-name">${escapeHtml(tool.name)}</div>
                    <div class="tool-rating"><span class="stars">${stars}</span> ${rating.toFixed(1)}</div>
                </div>
            </div>
            <div class="tool-desc">${escapeHtml(tool.desc||'暂无描述')}</div>
            <div class="tool-tags">${(tool.tags||[]).slice(0,4).map(tag=>`<span class="tool-tag">${escapeHtml(tag)}</span>`).join('')}</div>
            <div class="tool-footer">
                <div class="tool-category">${CATEGORIES[tool.category]?.name||'其他'}</div>
                <div class="tool-actions">
                    <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openUrl('${tool.url}')">访问</button>
                </div>
            </div>
        </div>`;
}

// 分类图标
function getIcon(cat) {
    const icons = {
        'agent':'B','chat':'C','code':'D','image':'I','video':'V',
        'audio':'A','writing':'W','data':'X','finance':'Q',
        'learning':'L','marketing':'M','search':'S','automation':'Z',
        'productivity':'P','research':'R','other':'+'
    };
    return icons[cat]||'?';
}

// 筛选分类
function filterCategory(cat) {
    currentCategory = cat;
    renderCategories();
    renderTools();
}

// 搜索
function searchTools() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    if (!q) { renderTools(); return; }
    
    const filtered = allTools.filter(t => 
        t.name.toLowerCase().includes(q) || 
        (t.desc||'').toLowerCase().includes(q) ||
        (t.tags||[]).some(tag=>tag.toLowerCase().includes(q))
    );
    
    const container = document.getElementById('tools-container');
    if (filtered.length > 0) {
        container.innerHTML = filtered.map(t => createToolCard(t)).join('');
    } else {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>无搜索结果</h3><p>没有找到 "${q}" 相关的工具</p></div>`;
    }
}

// 显示详情
function showDetail(id) {
    const tool = allTools.find(t => t.id === id);
    if (!tool) return;
    
    document.getElementById('detail-title').textContent = tool.name;
    const rating = tool.rating||4.0;
    
    document.getElementById('detail-body').innerHTML = `
        <div class="detail-meta">
            <div class="meta-item"><div class="meta-label">分类</div><div class="meta-value">${CATEGORIES[tool.category]?.name||'其他'}</div></div>
            <div class="meta-item"><div class="meta-label">评分</div><div class="meta-value">${rating.toFixed(1)} / 5.0</div></div>
            <div class="meta-item"><div class="meta-label">标签</div><div class="meta-value">${(tool.tags||[]).join('、')||'暂无'}</div></div>
            <div class="meta-item"><div class="meta-label">状态</div><div class="meta-value">${tool.isHot?'热门':(tool.isNew?'新增':'正常')}</div></div>
        </div>
        <div style="margin-bottom:18px">
            <h3 style="font-size:1em;font-weight:600;margin-bottom:8px">简介</h3>
            <p style="color:var(--text-secondary);line-height:1.65">${escapeHtml(tool.desc||'暂无描述')}</p>
        </div>
        <div class="detail-actions">
            <button class="btn btn-primary" onclick="openUrl('${tool.url}')">访问官网</button>
            <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
        </div>
    `;
    
    document.getElementById('detail-modal').classList.add('active');
}

function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }

// 视图切换
function setView(view) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderTools();
}

// 更新统计
function updateStats() {
    document.getElementById('stat-total').textContent = allTools.length;
    document.getElementById('stat-hot').textContent = allTools.filter(t=>t.isHot).length;
}

// 显示加载
function showLoading() {
    document.getElementById('tools-container').innerHTML = `<div class="loading" style="grid-column:1/-1"><div class="loading-spinner">&#9696;</div><p style="margin-top:12px">正在加载工具列表...</p></div>`;
}

// 显示错误
function showErrorState() {
    document.getElementById('tools-container').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>加载失败</h3><p>请刷新页面重试</p><br><button class="btn btn-primary" onclick="loadTools()">重试</button></div>`;
}

// 辅助函数
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function openUrl(url) {
    window.open(url, '_blank', 'noopener,noreferrer');
}

// Toast
function showToast(msg, type='info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// 点击模态框外部关闭
document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target.id === 'detail-modal') closeDetailModal();
});

// ESC 关闭
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetailModal();
});

// 初始化
document.addEventListener('DOMContentLoaded', loadTools);
</script>
